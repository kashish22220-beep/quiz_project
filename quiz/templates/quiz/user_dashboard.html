<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f0abfc, #c4b5fd); min-height: 100vh; padding: 30px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h1 { color: #333; margin-bottom: 10px; }
    .header p { color: #666; font-size: 14px; }
    .quiz-list { list-style: none; }
    .quiz-item { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: 0.3s; }
    .quiz-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .quiz-item strong { display: block; color: #333; font-size: 16px; margin-bottom: 8px; }
    .quiz-item p { color: #666; font-size: 13px; margin-bottom: 12px; }
    .take-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; display: inline-block; transition: 0.3s; }
    .take-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.3); }
    .footer { text-align: center; margin-top: 30px; }
    .footer a { color: white; text-decoration: none; margin: 0 15px; font-size: 14px; transition: 0.3s; }
    .footer a:hover { text-decoration: underline; }
    .empty { background: white; padding: 30px; border-radius: 10px; text-align: center; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dashboard</h1>
      <p>Welcome, <strong>{{ request.user.username }}</strong></p>
    </div>

    <h2 style="color: white; margin-bottom: 15px;">Available Quizzes</h2>
    <ul class="quiz-list">
      {% for quiz in quizzes %}
        <li class="quiz-item">
          <strong>{{ quiz.title }}</strong>
          <p>{{ quiz.description|default:"No description available" }}</p>
          <a class="take-btn" href="{% url 'quiz:take_quiz' quiz.id %}">Take Quiz →</a>
        </li>
      {% empty %}
        <li class="empty">No quizzes available yet.</li>
      {% endfor %}
    </ul>

    <div class="footer">
      <a href="{% url 'quiz:profile' %}">Profile</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</body>
</html>
